model:
  vocabulary_size: 8192
  hidden_size: 256
  embedding_dimension: 256
  num_attention_heads: 8
  num_hidden_layers: 4
  intermediate_size: 1024
  max_sequence_length: 256
  pooling: mean
  normalize_embeddings: true
  dropout: 0.1
training:
  objective: multiple_negatives_ranking
  epochs: 3
  batch_size: 32
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_gradient_norm: 1.0
  temperature: 0.05
  mixed_precision: false
  device: cpu
  seed: 42
  checkpoint_dir: artifacts/checkpoints-cpu

