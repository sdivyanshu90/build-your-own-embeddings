# Network-free demonstration: local tokenizer plus randomly initialized transformer.
model:
  vocabulary_size: 128
  hidden_size: 32
  embedding_dimension: 16
  num_attention_heads: 4
  num_hidden_layers: 2
  intermediate_size: 64
  max_sequence_length: 32
  pooling: mean
  normalize_embeddings: true
  dropout: 0.1
training:
  objective: info_nce
  epochs: 2
  batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 0.001
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_gradient_norm: 1.0
  temperature: 0.1
  mixed_precision: false
  device: cpu
  seed: 42
  checkpoint_dir: artifacts/checkpoints-from-scratch

