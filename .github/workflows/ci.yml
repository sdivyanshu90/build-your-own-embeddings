name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.7.1"
      - run: python -m pip install -c constraints/runtime.txt -e ".[dev,faiss]"
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy src
      - run: pytest -m unit -q
      - run: pytest -m integration -q
      - run: pytest -m end_to_end -q
      - run: pytest -m "not slow and not network and not gpu" --cov=embedding_model --cov-branch --cov-report=term-missing
      - run: python -m build
