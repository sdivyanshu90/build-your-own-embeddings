name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install "pip-audit>=2.7,<3"
      - run: python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.7.1"
      - run: python -m pip install -c constraints/runtime.txt .
      - run: pip-audit
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
